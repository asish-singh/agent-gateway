name: Mirror to GitHub Packages

# Publishes a scoped copy (@asish-singh/mcp-site-gateway) to the GitHub
# Packages registry so the repository page lists the package. The canonical
# install remains npm, npx mcp-site-gateway.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      - run: npm pkg set name=@asish-singh/mcp-site-gateway
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
